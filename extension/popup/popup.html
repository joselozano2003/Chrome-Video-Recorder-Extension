<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chrome Tab Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 360px;
      background: #0f0f0f;
      color: #e8e8e8;
      padding: 16px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    .dot.recording {
      background: #ff3b3b;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    button {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.35; cursor: default; }

    #btn-record { background: #e53935; color: #fff; }
    #btn-stop   { background: #333; color: #ccc; }

    /* ── Toggles ── */
    .toggles {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #aaa;
      cursor: pointer;
    }
    .toggle-label input[type="checkbox"] {
      accent-color: #e53935;
      width: 14px; height: 14px;
    }

    /* ── Status ── */
    #status {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      min-height: 16px;
    }

    /* ── Timer ── */
    #timer {
      font-size: 22px;
      font-weight: 700;
      color: #ff3b3b;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      margin-bottom: 14px;
      min-height: 28px;
    }

    /* ── Job List ── */
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 8px;
    }

    #job-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 260px;
      overflow-y: auto;
    }

    .job-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .job-id {
      font-size: 11px;
      color: #555;
      font-family: monospace;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 999px;
    }
    .badge-pending    { background: #2a2a2a; color: #888; }
    .badge-uploading  { background: #1a3a5c; color: #5ab4f5; }
    .badge-uploaded   { background: #1a3a2a; color: #5af0a0; }
    .badge-queued     { background: #2a2a1a; color: #e0c060; }
    .badge-transcribing { background: #2a1a3a; color: #c080f0; }
    .badge-completed  { background: #1a3a1a; color: #40d080; }
    .badge-failed     { background: #3a1a1a; color: #f05050; }

    /* Progress bar */
    .progress-bar-wrap {
      background: #2a2a2a;
      border-radius: 4px;
      height: 4px;
      margin: 6px 0;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #5ab4f5;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .job-links {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .job-links a {
      font-size: 11px;
      color: #5ab4f5;
      text-decoration: none;
    }
    .job-links a:hover { text-decoration: underline; }

    .job-error {
      font-size: 11px;
      color: #f05050;
      margin-top: 4px;
    }

    .btn-retry {
      margin-top: 6px;
      padding: 4px 10px;
      font-size: 11px;
      background: #3a1a1a;
      color: #f05050;
      border: 1px solid #5a2a2a;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-retry:hover { background: #5a1a1a; }

    .no-jobs {
      font-size: 12px;
      color: #444;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="dot" id="rec-dot"></div>
    <h1>Tab Recorder</h1>
  </header>

  <div class="controls">
    <button id="btn-record">Record</button>
    <button id="btn-stop" disabled>Stop</button>
  </div>

  <div class="toggles">
    <label class="toggle-label">
      <input type="checkbox" id="toggle-system-audio" checked />
      System audio
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="toggle-mic" checked />
      Microphone
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="toggle-audio-only" />
      Audio only
    </label>
  </div>

  <div id="status">Ready</div>
  <div id="timer"></div>

  <div class="section-title">Jobs</div>
  <div id="job-list"></div>

  <script src="popup.js"></script>
</body>
</html>
